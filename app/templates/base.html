<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Job Search Kit{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>Job Search Kit</strong>
      <span class="muted">local · private</span>
    </div>
    <nav>
      <a href="/" class="{{ 'on' if nav == 'dashboard' else '' }}">Dashboard</a>
      <a href="/applications/new" class="{{ 'on' if nav == 'new' else '' }}">New application</a>
      <a href="/search" class="{{ 'on' if nav == 'search' else '' }}">Search</a>
      <a href="/bookmarklet" class="{{ 'on' if nav == 'bookmarklet' else '' }}">Bookmarklet</a>
      <a href="/profile" class="{{ 'on' if nav == 'profile' else '' }}">Profile</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="muted small">
    Model: {{ profile.ollama_model or '—' }} · Ollama: {{ profile.ollama_url or '—' }}
  </footer>
</body>
</html>
